spring.application.name=blood_banking_system
server.port=8081

# ── Database ── (override via environment variables or .env)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blood_banking_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Reddy@6040}

# ── JPA (use 'validate' in production, 'update' for dev) ──
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──
app.jwt.secret=${JWT_SECRET:BloodBankingSystem_SecretKey_ForJWT_2024_VeryLong_MustBe32PlusChars!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Cookie ──
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}
